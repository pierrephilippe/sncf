name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SNCF_API_TOKEN: ci-placeholder

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E non-regression
        run: npm run test:e2e
        env:
          SNCF_API_TOKEN: ci-placeholder
